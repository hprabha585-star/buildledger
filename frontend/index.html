<head>

<style>
:root{--bg:#0d0f14;--s1:#141720;--s2:#1c2030;--s3:#222840;--bd:#252b3b;--acc:#f5a623;--grn:#2dce89;--red:#f5365c;--blu:#5e72e4;--txt:#e8eaf0;--mut:#6b7394;--fh:'Bebas Neue',sans-serif;--fb:'DM Sans',sans-serif;--fm:'JetBrains Mono',monospace;--r:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--txt);font-family:var(--fb);min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 20% 50%,rgba(245,166,35,.08),transparent 60%),var(--bg)}
.auth-card{background:var(--s1);border:1px solid var(--bd);border-radius:16px;padding:48px 40px;width:420px;max-width:95vw}
.auth-logo{font-family:var(--fh);font-size:36px;letter-spacing:2px;color:var(--acc)}
.auth-sub{color:var(--mut);font-size:13px;margin-bottom:36px;margin-top:2px}
.auth-tabs{display:flex;gap:2px;background:var(--bg);border-radius:8px;padding:4px;margin-bottom:24px}

.auth-tab.active{background:var(--acc);color:#000;font-weight:600}
.fg{margin-bottom:14px}
.fl{font-size:11px;font-weight:600;color:var(--mut);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;display:block}
.fi,.fs,.fta{width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:var(--r);padding:11px 13px;color:var(--txt);font-family:var(--fb);font-size:14px;outline:none;transition:border-color .2s}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--acc)}
.fi::placeholder{color:var(--mut)}
.fs{cursor:pointer}.fta{resize:vertical;min-height:70px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn{padding:10px 18px;border-radius:var(--r);font-family:var(--fb);font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .2s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;text-decoration:none}
.btn-p{background:var(--acc);color:#000}.btn-p:hover{background:#ffb733;transform:translateY(-1px)}
.btn-sm{padding:6px 13px;font-size:13px}
.btn-o{background:transparent;border:1px solid var(--bd);color:var(--txt)}.btn-o:hover{border-color:var(--acc);color:var(--acc)}
.btn-d{background:rgba(245,54,92,.12);color:var(--red);border:1px solid rgba(245,54,92,.25)}.btn-d:hover{background:rgba(245,54,92,.22)}
.btn-g{background:rgba(45,206,137,.12);color:var(--grn);border:1px solid rgba(45,206,137,.25)}
.btn-b{background:rgba(94,114,228,.12);color:var(--blu);border:1px solid rgba(94,114,228,.25)}
.btn-full{width:100%;justify-content:center;font-size:15px}
.err{background:rgba(245,54,92,.1);border:1px solid rgba(245,54,92,.3);color:var(--red);padding:10px 14px;border-radius:8px;font-size:13px;margin-top:10px}
.app{display:flex;min-height:100vh}
.sidebar{width:230px;background:var(--s1);border-right:1px solid var(--bd);display:flex;flex-direction:column;position:fixed;height:100vh;z-index:100}
.sb-logo{padding:22px 18px 14px;border-bottom:1px solid var(--bd)}

.li-amt.in{color:var(--grn)}.li-amt.out{color:var(--red)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.loader{display:flex;align-items:center;justify-content:center;padding:50px;color:var(--mut);flex-direction:column;gap:10px}
.spin{width:28px;height:28px;border:3px solid var(--bd);border-top-color:var(--acc);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}@keyframes fi{from{opacity:0}to{opacity:1}}
.empty{text-align:center;padding:50px 20px;color:var(--mut)}.ei{font-size:42px;margin-bottom:10px}.et{font-size:14px}
.swrap{position:relative}.swrap::before{content:'🔍';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px}
.sbar{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);padding:9px 12px 9px 34px;color:var(--txt);font-family:var(--fb);font-size:13px;outline:none;width:240px}

.toast.success{border-color:rgba(45,206,137,.4)}.toast.error{border-color:rgba(245,54,92,.4)}
@keyframes slideup{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.att-row{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:13px 15px;display:flex;align-items:center;gap:10px;transition:border-color .15s}

<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const {useState,useEffect,useCallback,useRef,createContext,useContext}=React;
const API=window.location.hostname==='localhost'||window.location.hostname==='127.0.0.1'
  ?'http://localhost:5000/api'
  :window.location.origin+'/api';
const TODAY=new Date().toISOString().split('T')[0];
const monthStart=()=>TODAY.slice(0,7)+'-01';
async function apiFetch(path,opts={}){
  const token=localStorage.getItem('bl_token');
  const res=await fetch(API+path,{headers:{'Content-Type':'application/json',...(token?{Authorization:`Bearer ${token}`}:{})}, ...opts});
  const d=await res.json();if(!res.ok)throw new Error(d.error||'Request failed');return d;
}
async function apiForm(path,fd,method='POST'){
  const token=localStorage.getItem('bl_token');
  const res=await fetch(API+path,{method,headers:{...(token?{Authorization:`Bearer ${token}`}:{})},body:fd});
  const d=await res.json();if(!res.ok)throw new Error(d.error||'Request failed');return d;
}
const fmt=n=>'₹'+Number(n||0).toLocaleString('en-IN');
const fmtD=d=>d?new Date(d+'T00:00:00').toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}):'—';
const fmtDs=d=>d?new Date(d+'T00:00:00').toLocaleDateString('en-IN',{day:'2-digit',month:'short'}):'—';
const wa=n=>n?`https://wa.me/91${n.replace(/\D/g,'')}`:'#';
const tel=n=>n?`tel:${n}`:'#';
const E=React.createElement;
const ToastCtx=createContext(null);
function ToastProvider({children}){
  const [toasts,setToasts]=useState([]);
  const show=useCallback((msg,type='success')=>{const id=Date.now();setToasts(t=>[...t,{id,msg,type}]);setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3200);},[]);
  return E(ToastCtx.Provider,{value:show},children,E('div',{className:'toast-wrap'},toasts.map(t=>E('div',{key:t.id,className:`toast ${t.type}`},t.type==='success'?'✅':'❌',t.msg))));
}
const useToast=()=>useContext(ToastCtx);

function AuthScreen({onLogin}){
  const [tab,setTab]=useState('login');
  const [f,setF]=useState({name:'',email:'',password:'',companyName:''});
  const [loading,setLoading]=useState(false);const [err,setErr]=useState('');
  const toast=useToast();const set=k=>ev=>setF(x=>({...x,[k]:ev.target.value}));

      setAttMap(m=>({...m,[workerId]:rec}));

      setAttMap(m=>({...m,[workerId]:updated}));

      toast(wname+(newVal?' — wage marked paid':' — marked unpaid'));
    }catch(e){toast(e.message,'error');setAttMap(m=>({...m,[workerId]:rec}));}
  };

  const assignSite=async(workerId,siteId)=>{
    setSitePicker(null);
    const rec=attMap[workerId];
    const status=rec?.status||'present';
    try{
      const updated=await apiFetch('/attendance/mark',{method:'POST',body:JSON.stringify({workerId,date,status,siteId:siteId||null})});
      setAttMap(m=>({...m,[workerId]:updated}));
      toast(siteId?'Site assigned':'Site removed');
    }catch(e){toast(e.message,'error');}
  };

  const loadSummary=()=>{
    apiFetch(`/attendance/wage-summary?startDate=${sumRange.start}&endDate=${sumRange.end}`).then(setSummary).catch(e=>toast(e.message,'error'));
  };

  const absentW=workers.filter(w=>!attMap[w._id]||attMap[w._id]?.status==='absent');
  const dayWage=presentW.reduce((s,w)=>s+w.dailyWage,0)+halfW.reduce((s,w)=>s+w.dailyWage/2,0);
  const paidToday=workers.filter(w=>attMap[w._id]?.wagePaid).reduce((s,w)=>{const st=attMap[w._id]?.status;return s+(st==='present'?w.dailyWage:st==='half'?w.dailyWage/2:0);},0);

            try{

              toast(r.message);
              setAttMap({});
              apiFetch('/attendance/stats').then(setStats).catch(()=>{});
              setSummary([]);
            }catch(e){toast(e.message,'error');}
          }
        },'🗑️ Delete All Records')
      ),

      E('div',{className:'tabs'},
        E('button',{className:`tab ${tab==='mark'?'active':''}`,onClick:()=>setTab('mark')},'📋 Mark Attendance'),
        E('button',{className:`tab ${tab==='summary'?'active':''}`,onClick:()=>setTab('summary')},'📊 Wage Summary')
      ),

      // ── MARK TAB ──
      tab==='mark'&&E('div',null,

        E('div',{className:'date-bar'},
          E('div',{className:'date-nav'},
            E('button',{onClick:()=>changeDate(-1)},'‹'),

            E('span',{className:'dchip',style:{background:'rgba(245,166,35,.15)',color:'var(--acc)'}},halfW.length+' Half'),
            E('span',{className:'dchip',style:{background:'rgba(245,54,92,.15)',color:'var(--red)'}},absentW.length+' Absent')
          ),
          E('div',{style:{marginLeft:'auto',textAlign:'right'}},

        ),

          ? E('div',{className:'loader'},E('div',{className:'spin'}))
          : E('div',{style:{display:'flex',flexDirection:'column',gap:'8px'}},
              workers.map(w=>{
                if(!wPhotos[w._id])loadPhoto(w._id);
                const rec=attMap[w._id];
                const status=rec?.status;
                const wagePaid=rec?.wagePaid||false;
                const assignedSite=rec?.siteId;
                const wage=status==='present'?w.dailyWage:status==='half'?w.dailyWage/2:0;
                const ph=wPhotos[w._id];
                const rowCls=`att-row ${status==='present'?'p-row':status==='half'?'h-row':'a-row'}`;

                return E('div',{key:w._id,className:rowCls},
                  // avatar
                  E('div',{className:'att-av'},ph?E('img',{src:ph,alt:w.name}):w.name[0]?.toUpperCase()),

                  // name + skill + site picker
                  E('div',{className:'att-inf'},
                    E('div',{className:'att-nm'},w.name),
                    E('div',{className:'att-mt'},w.skill+' · '+fmt(w.dailyWage)+'/day'),
                    E('div',{className:'spw'},
                      E('span',{className:'site-chip',onClick:()=>setSitePicker(sitePicker===w._id?null:w._id),title:'Optional: assign site'},
                        assignedSite?(assignedSite.name||'Site'):'+ Site (optional)'
                      ),
                      sitePicker===w._id&&E('div',{className:'spdd'},
                        E('button',{onClick:()=>assignSite(w._id,null)},'— No site —'),
                        sites.map(s=>E('button',{key:s._id,onClick:()=>assignSite(w._id,s._id)},s.name))
                      )
                    )
                  ),

                  // call / whatsapp
                  E('div',{className:'mini-ca'},
                    w.mobile&&E('a',{href:tel(w.mobile),title:'Call '+w.mobile},'📞'),
                    w.whatsapp&&E('a',{href:wa(w.whatsapp),target:'_blank',rel:'noreferrer',title:'WhatsApp'},'💬')
                  ),

                  // P / ½ / A
                  E('div',{className:'pha-btns'},
                    E('button',{className:`pha p ${status==='present'?'sel':''}`,onClick:()=>markStatus(w._id,'present')},'P'),
                    E('button',{className:`pha h ${status==='half'?'sel':''}`,onClick:()=>markStatus(w._id,'half')},'½'),
                    E('button',{className:`pha a ${status==='absent'?'sel':''}`,onClick:()=>markStatus(w._id,'absent')},'A')
                  ),

                  // Wage paid toggle — only shown when worker is present/half
                  wage>0
                    ? E('div',{className:'wage-toggle'},

                        E('button',{className:`tog ${wagePaid?'on':'off'}`,onClick:()=>toggleWagePaid(w._id),title:wagePaid?'Mark unpaid':'Mark paid'})
                      )

                  E('div',{className:`wchip ${wage>0?(wagePaid?'paid':'earned'):'zero'}`},wage>0?fmt(wage):'—')

      ),

      tab==='summary'&&E('div',null,
        E('div',{className:'card',style:{marginBottom:'14px'}},
          E('div',{style:{display:'flex',gap:'12px',alignItems:'flex-end',flexWrap:'wrap'}},
            E('div',{className:'fg',style:{margin:0}},E('label',{className:'fl'},'From'),E('input',{className:'fi',type:'date',value:sumRange.start,onChange:ev=>setSumRange(r=>({...r,start:ev.target.value}))})),

              ),

                E('tbody',null,summary.map((s,i)=>{

function Owners(){
  const [owners,setOwners]=useState([]);const [loading,setLoading]=useState(true);
  const [modal,setModal]=useState(null);const [detail,setDetail]=useState(null);
  const [f,setF]=useState({name:'',mobile:'',whatsapp:'',email:'',address:'',notes:''});
  const [saving,setSaving]=useState(false);const toast=useToast();
  const load=()=>apiFetch('/owners').then(d=>{setOwners(d);setLoading(false);});
  useEffect(()=>{load();},[]);
  const openAdd=()=>{setF({name:'',mobile:'',whatsapp:'',email:'',address:'',notes:''});setModal('add');};
  const openEdit=o=>{setF({name:o.name,mobile:o.mobile,whatsapp:o.whatsapp||'',email:o.email||'',address:o.address||'',notes:o.notes||''});setModal(o);};
  const set=k=>ev=>{
    const val=ev.target.value;
    setF(x=>{
      const upd={...x,[k]:val};
      if(k==='mobile'&&(x.whatsapp===''||x.whatsapp===x.mobile))upd.whatsapp=val;
      return upd;
    });
  };
  const save=async()=>{setSaving(true);try{if(modal==='add'){await apiFetch('/owners',{method:'POST',body:JSON.stringify(f)});toast('Owner added');}else{await apiFetch(`/owners/${modal._id}`,{method:'PUT',body:JSON.stringify(f)});toast('Updated');}setModal(null);load();}catch(e){toast(e.message,'error');}setSaving(false);};
  const del=async id=>{if(!confirm('Delete?'))return;try{await apiFetch(`/owners/${id}`,{method:'DELETE'});toast('Deleted');load();}catch(e){toast(e.message,'error');}};
  if(detail)return E(OwnerDetail,{ownerId:detail,onBack:()=>setDetail(null)});
  return E('div',null,
    E('div',{className:'ph'},E('div',{className:'ptitle'},'OWNERS'),E('div',{className:'psub'},'Property owners')),

        loading?E('div',{className:'loader'},E('div',{className:'spin'})):owners.length===0?E('div',{className:'empty'},E('div',{className:'ei'},'👤'),E('div',{className:'et'},'No owners yet')):
        E('div',{className:'tw'},E('table',null,
          E('thead',null,E('tr',null,['Name','Mobile','WhatsApp','Address',''].map(h=>E('th',{key:h},h)))),
          E('tbody',null,owners.map(o=>E('tr',{key:o._id},
            E('td',null,E('strong',{style:{cursor:'pointer',color:'var(--acc)'},onClick:()=>setDetail(o._id)},o.name)),
            E('td',null,o.mobile?E('a',{href:tel(o.mobile),style:{color:'var(--txt)',textDecoration:'none'}},'📞 '+o.mobile):'—'),
            E('td',null,o.whatsapp?E('a',{href:wa(o.whatsapp),target:'_blank',rel:'noreferrer',style:{color:'var(--grn)',textDecoration:'none'}},'💬 Chat'):'—'),
            E('td',null,o.address||'—'),
            E('td',null,E('div',{style:{display:'flex',gap:'6px'}},E('button',{className:'btn btn-sm btn-o',onClick:()=>setDetail(o._id)},'👁'),E('button',{className:'btn btn-sm btn-o',onClick:()=>openEdit(o)},'✏️'),E('button',{className:'btn btn-sm btn-d',onClick:()=>del(o._id)},'🗑️')))
          )))
        ))
      )
    ),
    modal!==null&&E('div',{className:'ov',onClick:ev=>ev.target.className==='ov'&&setModal(null)},E('div',{className:'modal'},
      E('div',{className:'mh'},E('div',{className:'mt'},modal==='add'?'Add Owner':'Edit Owner'),E('button',{className:'mc',onClick:()=>setModal(null)},'✕')),
      E('div',{className:'mb'},
        E('div',{className:'frow'},E('div',{className:'fg'},E('label',{className:'fl'},'Owner Name *'),E('input',{className:'fi',value:f.name,onChange:set('name'),placeholder:'Rajesh Sharma'})),E('div',{className:'fg'},E('label',{className:'fl'},'Mobile *'),E('input',{className:'fi',value:f.mobile,onChange:set('mobile'),placeholder:'9876543210',type:'tel'}))),
        E('div',{className:'frow'},E('div',{className:'fg'},E('label',{className:'fl'},'WhatsApp'),E('input',{className:'fi',value:f.whatsapp,onChange:set('whatsapp'),placeholder:'Auto-filled from mobile',type:'tel'})),E('div',{className:'fg'},E('label',{className:'fl'},'Email'),E('input',{className:'fi',type:'email',value:f.email,onChange:set('email'),placeholder:'owner@email.com'}))),
        E('div',{className:'fg'},E('label',{className:'fl'},'Address'),E('input',{className:'fi',value:f.address,onChange:set('address'),placeholder:'House address'})),
        E('div',{className:'fg'},E('label',{className:'fl'},'Notes'),E('textarea',{className:'fta',value:f.notes,onChange:set('notes'),placeholder:'Any notes…'})),
        E('div',{className:'mact'},E('button',{className:'btn btn-o',onClick:()=>setModal(null)},'Cancel'),E('button',{className:'btn btn-p',onClick:save,disabled:saving},saving?'Saving…':'Save'))
      )
    ))
  );
}

              E('label',{className:'fl'},'Worker (if labor)'),
              E('select',{className:'fs',value:f.workerId,onChange:set('workerId')},[E('option',{key:'',value:''},'— None —'),...workers.map(w=>E('option',{key:w._id,value:w._id},w.name))])
            )
          ),
          E('div',{className:'fg'},
            E('label',{className:'fl'},'Description'),
            E('input',{className:'fi',value:f.description,onChange:set('description'),placeholder:'Weekly payout / cement bags / crane hire…'})
          ),
          E('div',{className:'mact'},
            E('button',{className:'btn btn-o',onClick:()=>setModal(false)},'Cancel'),
            E('button',{className:'btn btn-p',onClick:save,disabled:saving||!f.amount},saving?'Saving…':'Log Expense')
          )
        )
      )
    )
  );
}
const PAGES={dashboard:Dashboard,workers:Workers,attendance:Attendance,sites:Sites,owners:Owners,payments:Payments,expenses:Expenses};
function App(){
  const [user,setUser]=useState(()=>{try{return JSON.parse(localStorage.getItem('bl_user'));}catch{return null;}});
  const [page,setPage]=useState('dashboard');
  const logout=()=>{localStorage.removeItem('bl_token');localStorage.removeItem('bl_user');setUser(null);};
  const Page=PAGES[page]||Dashboard;
  return E(ToastProvider,null,!user?E(AuthScreen,{onLogin:u=>{setUser(u);setPage('dashboard');}}):E('div',{className:'app'},E(Sidebar,{page,setPage,user,onLogout:logout}),E('div',{className:'main'},E(Page,{setPage}))));
}
ReactDOM.createRoot(document.getElementById('root')).render(E(App));
</script></body></html>
