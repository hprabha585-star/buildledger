<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<meta name="theme-color" content="#0d0f14">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>BuildLedger</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14;
  --s1: #141720;
  --s2: #1c2030;
  --s3: #222840;
  --bd: #252b3b;
  --acc: #f5a623;
  --grn: #2dce89;
  --red: #f5365c;
  --blu: #5e72e4;
  --txt: #e8eaf0;
  --mut: #6b7394;
  --fb: 'DM Sans', sans-serif;
  --fm: 'JetBrains Mono', monospace;
  --r: 12px;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  background: var(--bg);
  color: var(--txt);
  font-family: var(--fb);
  min-height: 100vh;
  padding-bottom: 70px;
}

/* Bottom Navigation */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--s1);
  border-top: 1px solid var(--bd);
  display: flex;
  justify-content: space-around;
  padding: 8px 12px;
  padding-bottom: max(8px, env(safe-area-inset-bottom));
  z-index: 100;
}

.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  background: none;
  border: none;
  color: var(--mut);
  font-size: 11px;
  padding: 8px 12px;
  border-radius: 10px;
  cursor: pointer;
  transition: all .15s;
  font-family: var(--fb);
}

.nav-item .ico { font-size: 22px; }
.nav-item.active { color: var(--acc); background: rgba(245,166,35,.1); }

.main {
  padding: 16px;
  padding-bottom: 20px;
}

/* Cards & Layout */
.ph { margin-bottom: 16px; }
.ptitle { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; background: linear-gradient(135deg, #fff, var(--acc)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.psub { color: var(--mut); font-size: 12px; margin-top: 2px; }

.card {
  background: var(--s1);
  border: 1px solid var(--bd);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 12px;
}

.ch {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
  flex-wrap: wrap;
  gap: 10px;
}
.ct { font-size: 15px; font-weight: 600; }

.sgrid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin-bottom: 16px;
}

.sc {
  background: var(--s1);
  border: 1px solid var(--bd);
  border-radius: 12px;
  padding: 14px;
  position: relative;
  overflow: hidden;
}
.sc::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
.sc.or::before { background: var(--acc); }
.sc.gn::before { background: var(--grn); }
.sc.rd::before { background: var(--red); }
.sc.bl::before { background: var(--blu); }
.si { font-size: 18px; margin-bottom: 6px; }
.sv { font-size: 24px; font-weight: 700; }
.sv.or { color: var(--acc); }
.sv.gn { color: var(--grn); }
.sv.rd { color: var(--red); }
.sv.bl { color: var(--blu); }
.slb { font-size: 11px; color: var(--mut); }

/* Forms */
.fi, .fs, .fta {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--bd);
  border-radius: 10px;
  padding: 12px 14px;
  color: var(--txt);
  font-size: 14px;
  outline: none;
}
.fi:focus, .fs:focus { border-color: var(--acc); }
.fl { font-size: 11px; font-weight: 600; color: var(--mut); margin-bottom: 5px; display: block; }
.fg { margin-bottom: 14px; }
.frow { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.btn {
  padding: 10px 16px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all .2s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn-p { background: var(--acc); color: #000; }
.btn-o { background: transparent; border: 1px solid var(--bd); color: var(--txt); }
.btn-d { background: rgba(245,54,92,.12); color: var(--red); border: 1px solid rgba(245,54,92,.25); }
.btn-sm { padding: 7px 12px; font-size: 12px; }

.badge {
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 10px;
  font-weight: 600;
}
.bg-g { background: rgba(45,206,137,.15); color: var(--grn); }
.bg-r { background: rgba(245,54,92,.15); color: var(--red); }
.bg-o { background: rgba(245,166,35,.15); color: var(--acc); }
.bg-b { background: rgba(94,114,228,.15); color: var(--blu); }

/* Worker Grid */
.wgrid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
}
.wcard {
  background: var(--s2);
  border: 1px solid var(--bd);
  border-radius: 12px;
  padding: 14px;
  text-align: center;
}
.wavatar {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--acc);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 8px;
  font-size: 20px;
  font-weight: 700;
  cursor: pointer;
  overflow: hidden;
}
.wavatar img { width: 100%; height: 100%; object-fit: cover; }
.wname { font-size: 14px; font-weight: 600; cursor: pointer; }
.wskill { font-size: 11px; color: var(--mut); margin: 4px 0; }
.wwage { font-size: 13px; color: var(--acc); font-weight: 600; }

/* Attendance */
.att-row {
  background: var(--s2);
  border: 1px solid var(--bd);
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.att-av {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--acc);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  flex-shrink: 0;
  overflow: hidden;
}
.att-inf { flex: 1; min-width: 120px; }
.att-nm { font-size: 14px; font-weight: 600; }
.att-mt { font-size: 11px; color: var(--mut); }
.pha-btns { display: flex; gap: 6px; }
.pha {
  padding: 5px 10px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  border: 1.5px solid;
  background: transparent;
}
.pha.p { border-color: var(--grn); color: var(--grn); }
.pha.p.sel { background: var(--grn); color: #000; }
.pha.h { border-color: var(--acc); color: var(--acc); }
.pha.h.sel { background: var(--acc); color: #000; }
.pha.a { border-color: var(--red); color: var(--red); }
.pha.a.sel { background: var(--red); color: #fff; }

.tog {
  width: 40px;
  height: 20px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  position: relative;
  transition: background .2s;
}
.tog.on { background: var(--grn); }
.tog.off { background: var(--bd); }
.tog::after {
  content: '';
  position: absolute;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: #fff;
  top: 2px;
  transition: left .2s;
}
.tog.on::after { left: 21px; }
.tog.off::after { left: 3px; }

.date-bar {
  background: var(--s2);
  border: 1px solid var(--bd);
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 12px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.date-nav { display: flex; gap: 6px; align-items: center; }
.date-nav button {
  background: var(--s3);
  border: 1px solid var(--bd);
  color: var(--txt);
  width: 36px;
  height: 36px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 18px;
}

/* Modal */
.ov {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.8);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
.modal {
  background: var(--s1);
  border: 1px solid var(--bd);
  border-radius: 20px;
  width: 100%;
  max-width: 500px;
  max-height: 85vh;
  overflow-y: auto;
}
.mh { padding: 18px 20px 0; display: flex; justify-content: space-between; align-items: center; }
.mt { font-size: 17px; font-weight: 600; }
.mc { background: none; border: none; color: var(--mut); font-size: 22px; cursor: pointer; }
.mb { padding: 16px 20px 20px; }
.mact { display: flex; gap: 10px; margin-top: 16px; }
.mact .btn { flex: 1; justify-content: center; }

.loader { text-align: center; padding: 40px; color: var(--mut); }
.spin { width: 28px; height: 28px; border: 3px solid var(--bd); border-top-color: var(--acc); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 10px; }
@keyframes spin { to { transform: rotate(360deg); } }

.empty { text-align: center; padding: 40px; color: var(--mut); }
.ei { font-size: 48px; margin-bottom: 8px; }

.toast-wrap {
  position: fixed;
  bottom: 80px;
  left: 16px;
  right: 16px;
  z-index: 9999;
}
.toast {
  background: var(--s2);
  border: 1px solid var(--bd);
  border-radius: 12px;
  padding: 12px 16px;
  font-size: 13px;
  margin-bottom: 8px;
}

@media (min-width: 768px) {
  .sgrid { grid-template-columns: repeat(4, 1fr); }
  .wgrid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
  .toast-wrap { bottom: 20px; right: 20px; left: auto; width: 320px; }
}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const { useState, useEffect, useCallback, useRef, createContext, useContext } = React;

const API = window.location.hostname === 'localhost' ? 'http://localhost:5000/api' : window.location.origin + '/api';
const TODAY = new Date().toISOString().split('T')[0];

async function apiFetch(path, opts = {}) {
  const token = localStorage.getItem('bl_token');
  const res = await fetch(API + path, {
    headers: { 'Content-Type': 'application/json', ...(token ? { Authorization: `Bearer ${token}` } : {}) },
    ...opts
  });
  const d = await res.json();
  if (!res.ok) throw new Error(d.error || 'Request failed');
  return d;
}

async function apiForm(path, fd, method = 'POST') {
  const token = localStorage.getItem('bl_token');
  const res = await fetch(API + path, { method, headers: { ...(token ? { Authorization: `Bearer ${token}` } : {}) }, body: fd });
  const d = await res.json();
  if (!res.ok) throw new Error(d.error || 'Request failed');
  return d;
}

const fmt = n => '₹' + Number(n || 0).toLocaleString('en-IN');
const fmtD = d => d ? new Date(d + 'T00:00:00').toLocaleDateString('en-IN', { day: '2-digit', month: 'short' }) : '—';
const wa = n => n ? `https://wa.me/91${n.replace(/\D/g, '')}` : '#';
const tel = n => n ? `tel:${n}` : '#';
const E = React.createElement;

const ToastCtx = createContext(null);
function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);
  const show = useCallback((msg, type = 'success') => {
    const id = Date.now();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3000);
  }, []);
  return E(ToastCtx.Provider, { value: show }, children, E('div', { className: 'toast-wrap' }, toasts.map(t => E('div', { key: t.id, className: 'toast' }, t.type === 'success' ? '✓' : '⚠️', t.msg))));
}
const useToast = () => useContext(ToastCtx);

function AuthScreen({ onLogin }) {
  const [tab, setTab] = useState('login');
  const [f, setF] = useState({ name: '', email: '', password: '', companyName: '' });
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');
  const toast = useToast();
  const set = k => ev => setF(x => ({ ...x, [k]: ev.target.value }));
  const submit = async () => {
    setErr(''); setLoading(true);
    try {
      const d = await apiFetch(`/auth/${tab}`, { method: 'POST', body: JSON.stringify(f) });
      localStorage.setItem('bl_token', d.token);
      localStorage.setItem('bl_user', JSON.stringify(d.user));
      toast('Welcome ' + d.user.name);
      onLogin(d.user);
    } catch (e) { setErr(e.message); }
    setLoading(false);
  };
  return E('div', { style: { minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '20px', background: 'radial-gradient(ellipse at 20% 50%, rgba(245,166,35,.08), transparent 60%), var(--bg)' } },
    E('div', { style: { background: 'var(--s1)', border: '1px solid var(--bd)', borderRadius: '24px', padding: '32px 24px', width: '100%', maxWidth: '400px' } },
      E('div', { style: { fontSize: '32px', fontWeight: 'bold', color: 'var(--acc)', textAlign: 'center', marginBottom: '4px' } }, '🏗️ BUILDLEDGER'),
      E('div', { style: { textAlign: 'center', color: 'var(--mut)', fontSize: '12px', marginBottom: '28px' } }, 'Construction Management'),
      E('div', { style: { display: 'flex', gap: '8px', background: 'var(--bg)', borderRadius: '12px', padding: '4px', marginBottom: '24px' } },
        ['login', 'register'].map(t => E('button', { key: t, style: { flex: 1, padding: '10px', borderRadius: '8px', border: 'none', background: tab === t ? 'var(--acc)' : 'transparent', color: tab === t ? '#000' : 'var(--mut)', fontWeight: 600, cursor: 'pointer' }, onClick: () => { setTab(t); setErr(''); } }, t === 'login' ? 'Sign In' : 'Register'))),
      tab === 'register' && E('div', { className: 'fg' }, E('label', { className: 'fl' }, 'Name'), E('input', { className: 'fi', value: f.name, onChange: set('name') })),
      tab === 'register' && E('div', { className: 'fg' }, E('label', { className: 'fl' }, 'Company'), E('input', { className: 'fi', value: f.companyName, onChange: set('companyName') })),
      E('div', { className: 'fg' }, E('label', { className: 'fl' }, 'Email'), E('input', { className: 'fi', type: 'email', value: f.email, onChange: set('email') })),
      E('div', { className: 'fg' }, E('label', { className: 'fl' }, 'Password'), E('input', { className: 'fi', type: 'password', value: f.password, onChange: set('password') })),
      err && E('div', { style: { color: 'var(--red)', fontSize: '13px', marginTop: '10px' } }, err),
      E('button', { className: 'btn btn-p', style: { width: '100%', marginTop: '18px', justifyContent: 'center' }, onClick: submit, disabled: loading }, loading ? 'Loading...' : (tab === 'login' ? 'Sign In' : 'Create Account'))
    )
  );
}

function BottomNav({ page, setPage, onLogout, showMore, setShowMore }) {
  const mainItems = [{ id: 'dashboard', ico: '📊', label: 'Home' }, { id: 'workers', ico: '👷', label: 'Workers' }, { id: 'attendance', ico: '📋', label: 'Attendance' }, { id: 'sites', ico: '🏗️', label: 'Sites' }];
  const moreItems = [{ id: 'owners', ico: '👤', label: 'Owners' }, { id: 'payments', ico: '💰', label: 'Payments' }, { id: 'expenses', ico: '💸', label: 'Expenses' }];
  return E('div', { className: 'bottom-nav' },
    mainItems.map(item => E('button', { key: item.id, className: `nav-item ${page === item.id ? 'active' : ''}`, onClick: () => { setPage(item.id); setShowMore(false); } }, E('span', { className: 'ico' }, item.ico), E('span', null, item.label))),
    E('div', { style: { position: 'relative' } },
      E('button', { className: `nav-item ${showMore ? 'active' : ''}`, onClick: () => setShowMore(!showMore) }, E('span', { className: 'ico' }, '⚙️'), E('span', null, 'More')),
      showMore && E('div', { style: { position: 'absolute', bottom: '100%', left: '50%', transform: 'translateX(-50%)', background: 'var(--s1)', border: '1px solid var(--bd)', borderRadius: '12px', padding: '8px', marginBottom: '8px', minWidth: '140px', zIndex: 200 } },
        moreItems.map(item => E('button', { key: item.id, className: 'nav-item', style: { width: '100%', flexDirection: 'row', justifyContent: 'flex-start', gap: '10px', padding: '10px' }, onClick: () => { setPage(item.id); setShowMore(false); } }, E('span', { className: 'ico' }, item.ico), E('span', null, item.label))),
        E('hr', { style: { margin: '8px 0', borderColor: 'var(--bd)' } }),
        E('button', { className: 'nav-item', style: { width: '100%', flexDirection: 'row', justifyContent: 'flex-start', gap: '10px', padding: '10px', color: 'var(--red)' }, onClick: onLogout }, E('span', { className: 'ico' }, '🚪'), E('span', null, 'Logout'))
      )
    )
  );
}

function Dashboard({ setPage }) {
  const [data, setData] = useState(null);
  useEffect(() => { apiFetch('/finance/dashboard').then(setData).catch(() => {}); }, []);
  if (!data) return E('div', { className: 'loader' }, E('div', { className: 'spin' }), 'Loading...');
  const { totals: t, todayAttendance: ta, recentPayments, sites } = data;
  return E('div', { className: 'main' },
    E('div', { className: 'ph' }, E('div', { className: 'ptitle' }, 'BUILDLEDGER'), E('div', { className: 'psub' }, fmtD(TODAY))),
    E('div', { className: 'sgrid' },
      E('div', { className: 'sc or' }, E('div', { className: 'si' }, '💰'), E('div', { className: 'sv or' }, fmt(t.totalReceived)), E('div', { className: 'slb' }, 'Received')),
      E('div', { className: 'sc rd' }, E('div', { className: 'si' }, '⚠️'), E('div', { className: 'sv rd' }, fmt(t.totalOutstanding)), E('div', { className: 'slb' }, 'Outstanding')),
      E('div', { className: 'sc gn' }, E('div', { className: 'si' }, '📈'), E('div', { className: 'sv gn' }, fmt(t.netProfit)), E('div', { className: 'slb' }, 'Profit')),
      E('div', { className: 'sc bl' }, E('div', { className: 'si' }, '👷'), E('div', { className: 'sv bl' }, ta.present), E('div', { className: 'slb' }, 'Present Today'))
    ),
    E('div', { className: 'card' }, E('div', { className: 'ch' }, E('div', { className: 'ct' }, '💰 Recent Payments'), E('button', { className: 'btn btn-o btn-sm', onClick: () => setPage('payments') }, 'View All')),
      recentPayments?.slice(0, 3).map(p => E('div', { key: p._id, style: { display: 'flex', justifyContent: 'space-between', padding: '10px 0', borderBottom: '1px solid var(--bd)' } }, E('div', null, E('div', { style: { fontSize: '13px', fontWeight: 500 } }, p.siteId?.name || '—'), E('div', { style: { fontSize: '11px', color: 'var(--mut)' } }, fmtD(p.date))), E('div', { style: { color: 'var(--grn)', fontWeight: 600 } }, fmt(p.amount))))),
    E('div', { className: 'card' }, E('div', { className: 'ch' }, E('div', { className: 'ct' }, '🏗️ Active Sites'), E('button', { className: 'btn btn-o btn-sm', onClick: () => setPage('sites') }, 'View All')),
      sites?.filter(s => s.status === 'active').slice(0, 3).map(s => E('div', { key: s._id, style: { display: 'flex', justifyContent: 'space-between', padding: '10px 0', borderBottom: '1px solid var(--bd)' } }, E('div', null, E('div', { style: { fontSize: '13px', fontWeight: 500 } }, s.name), E('div', { style: { fontSize: '11px', color: 'var(--mut)' } }, s.location)), E('div', { style: { fontWeight: 600 } }, fmt(s.contractAmount)))))
  );
}

function Workers() {
  const [workers, setWorkers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [modal, setModal] = useState(null);
  const [form, setForm] = useState({ name: '', mobile: '', skill: 'Mason', dailyWage: '' });
  const toast = useToast();
  const load = () => apiFetch('/workers').then(w => { setWorkers(w); setLoading(false); });
  useEffect(() => { load(); }, []);
  const save = async () => {
    try {
      await apiFetch('/workers', { method: 'POST', body: JSON.stringify({ ...form, dailyWage: Number(form.dailyWage), contractorId: 'auto' }) });
      toast('Worker added');
      setModal(null);
      setForm({ name: '', mobile: '', skill: 'Mason', dailyWage: '' });
      load();
    } catch (e) { toast(e.message, 'error'); }
  };
  const del = async (id) => { if (confirm('Delete?')) { await apiFetch(`/workers/${id}`, { method: 'DELETE' }); toast('Deleted'); load(); } };
  if (loading) return E('div', { className: 'loader' }, E('div', { className: 'spin' }));
  return E('div', { className: 'main' },
    E('div', { className: 'ph' }, E('div', { className: 'ptitle' }, 'WORKERS'), E('div', { className: 'psub' }, workers.length + ' workers')),
    E('div', { className: 'card' }, E('div', { className: 'ch' }, E('div', { className: 'ct' }, 'All Workers'), E('button', { className: 'btn btn-p btn-sm', onClick: () => setModal('add') }, '+ Add')),
      workers.length === 0 ? E('div', { className: 'empty' }, E('div', { className: 'ei' }, '👷'), 'No workers') :
