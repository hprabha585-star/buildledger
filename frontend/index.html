<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<meta name="theme-color" content="#0d0f14">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>BuildLedger - Construction Management</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --bg: #0a0c10;
  --surface: #12151c;
  --surface2: #1a1f2a;
  --border: #252b3b;
  --primary: #f5a623;
  --success: #2dce89;
  --danger: #f5365c;
  --info: #5e72e4;
  --text: #e8eaf0;
  --text-secondary: #8a92b0;
  --font: 'Inter', sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  padding-bottom: 70px;
}

/* Bottom Navigation */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-around;
  padding: 8px 12px;
  padding-bottom: max(8px, env(safe-area-inset-bottom));
  z-index: 100;
}

.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  background: none;
  border: none;
  color: var(--text-secondary);
  font-size: 11px;
  padding: 8px 12px;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: var(--font);
}

.nav-item .ico { font-size: 22px; }
.nav-item.active { color: var(--primary); background: rgba(245, 166, 35, 0.1); }

/* Main Content */
.main {
  padding: 16px;
  padding-bottom: 20px;
}

/* Header */
.header { margin-bottom: 20px; }
.title { font-size: 28px; font-weight: 800; background: linear-gradient(135deg, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.subtitle { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

/* Cards */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 12px;
}

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
}
.card-title { font-size: 15px; font-weight: 600; }

/* Stats Grid */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin-bottom: 16px;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px;
  position: relative;
  overflow: hidden;
}
.stat-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
}
.stat-card.income::before { background: var(--success); }
.stat-card.outstanding::before { background: var(--danger); }
.stat-card.profit::before { background: var(--primary); }
.stat-card.workers::before { background: var(--info); }
.stat-icon { font-size: 20px; margin-bottom: 6px; }
.stat-value { font-size: 24px; font-weight: 700; }
.stat-value.income { color: var(--success); }
.stat-value.outstanding { color: var(--danger); }
.stat-value.profit { color: var(--primary); }
.stat-value.workers { color: var(--info); }
.stat-label { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }

/* Forms */
.input-group { margin-bottom: 14px; }
.label { font-size: 11px; font-weight: 600; color: var(--text-secondary); margin-bottom: 5px; display: block; text-transform: uppercase; letter-spacing: 0.5px; }
.input, .select, .textarea {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  color: var(--text);
  font-size: 14px;
  outline: none;
  font-family: var(--font);
}
.input:focus, .select:focus { border-color: var(--primary); }
.row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* Buttons */
.btn {
  padding: 10px 16px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--font);
}
.btn-primary { background: var(--primary); color: #000; }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
.btn-danger { background: rgba(245, 54, 92, 0.12); color: var(--danger); border: 1px solid rgba(245, 54, 92, 0.25); }
.btn-small { padding: 7px 12px; font-size: 12px; }
.btn-full { width: 100%; justify-content: center; }

/* Badges */
.badge {
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 10px;
  font-weight: 600;
  display: inline-block;
}
.badge-success { background: rgba(45, 206, 137, 0.15); color: var(--success); }
.badge-danger { background: rgba(245, 54, 92, 0.15); color: var(--danger); }
.badge-warning { background: rgba(245, 166, 35, 0.15); color: var(--primary); }
.badge-info { background: rgba(94, 114, 228, 0.15); color: var(--info); }

/* Worker Grid */
.worker-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 12px;
}
.worker-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px;
  text-align: center;
}
.worker-avatar {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--primary);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 10px;
  font-size: 22px;
  font-weight: 700;
  color: #000;
}
.worker-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.worker-skill { font-size: 10px; color: var(--text-secondary); margin-bottom: 6px; }
.worker-wage { font-size: 13px; color: var(--primary); font-weight: 600; }

/* Attendance Row */
.attendance-row {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 12px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.attendance-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--primary);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  flex-shrink: 0;
}
.attendance-info { flex: 1; min-width: 120px; }
.attendance-name { font-size: 14px; font-weight: 600; }
.attendance-meta { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
.status-buttons { display: flex; gap: 6px; }
.status-btn {
  padding: 6px 12px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  border: 1.5px solid;
  background: transparent;
}
.status-btn.present { border-color: var(--success); color: var(--success); }
.status-btn.present.active { background: var(--success); color: #000; }
.status-btn.half { border-color: var(--primary); color: var(--primary); }
.status-btn.half.active { background: var(--primary); color: #000; }
.status-btn.absent { border-color: var(--danger); color: var(--danger); }
.status-btn.absent.active { background: var(--danger); color: #fff; }
.wage-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
}
.toggle {
  width: 44px;
  height: 22px;
  border-radius: 11px;
  border: none;
  cursor: pointer;
  position: relative;
  transition: background 0.2s;
}
.toggle.on { background: var(--success); }
.toggle.off { background: var(--border); }
.toggle::after {
  content: '';
  position: absolute;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: white;
  top: 2px;
  transition: left 0.2s;
}
.toggle.on::after { left: 24px; }
.toggle.off::after { left: 2px; }

/* Date Bar */
.date-bar {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 12px;
  margin-bottom: 12px;
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  align-items: center;
}
.date-nav { display: flex; gap: 6px; align-items: center; }
.date-nav button {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  width: 38px;
  height: 38px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 18px;
}

/* Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.85);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  width: 100%;
  max-width: 500px;
  max-height: 85vh;
  overflow-y: auto;
}
.modal-header {
  padding: 18px 20px 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.modal-title { font-size: 17px; font-weight: 600; }
.modal-close {
  background: none;
  border: none;
  color: var(--text-secondary);
  font-size: 22px;
  cursor: pointer;
}
.modal-body { padding: 16px 20px 20px; }
.modal-actions { display: flex; gap: 10px; margin-top: 16px; }
.modal-actions .btn { flex: 1; justify-content: center; }

/* List Items */
.list-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.list-item:last-child { border-bottom: none; }
.list-item-info { flex: 1; }
.list-item-title { font-size: 14px; font-weight: 500; }
.list-item-sub { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
.list-item-amount { font-weight: 600; }
.list-item-amount.positive { color: var(--success); }
.list-item-amount.negative { color: var(--danger); }

/* Site Card */
.site-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 10px;
}
.site-name { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.site-location { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }
-site-stats { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }

/* Empty State */
.empty-state {
  text-align: center;
  padding: 40px;
  color: var(--text-secondary);
}
.empty-icon { font-size: 48px; margin-bottom: 10px; }

/* Loader */
.loader {
  text-align: center;
  padding: 40px;
}
.spinner {
  width: 30px;
  height: 30px;
  border: 3px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 10px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Toast */
.toast-container {
  position: fixed;
  bottom: 80px;
  left: 16px;
  right: 16px;
  z-index: 9999;
}
.toast {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 16px;
  font-size: 13px;
  margin-bottom: 8px;
  animation: slideUp 0.2s ease;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Auth Screen */
.auth-container {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background: radial-gradient(ellipse at 20% 50%, rgba(245, 166, 35, 0.08), transparent 60%), var(--bg);
}
.auth-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 32px 24px;
  width: 100%;
  max-width: 400px;
}
.auth-logo { font-size: 32px; font-weight: 800; color: var(--primary); text-align: center; margin-bottom: 4px; }
.auth-sub { text-align: center; color: var(--text-secondary); font-size: 12px; margin-bottom: 28px; }
.auth-tabs {
  display: flex;
  gap: 8px;
  background: var(--bg);
  border-radius: 12px;
  padding: 4px;
  margin-bottom: 24px;
}
.auth-tab {
  flex: 1;
  padding: 10px;
  text-align: center;
  border-radius: 8px;
  border: none;
  background: transparent;
  color: var(--text-secondary);
  font-weight: 600;
  cursor: pointer;
}
.auth-tab.active { background: var(--primary); color: #000; }

@media (min-width: 768px) {
  .stats-grid { grid-template-columns: repeat(4, 1fr); }
  .worker-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
  .toast-container { bottom: 20px; right: 20px; left: auto; width: 320px; }
}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const { useState, useEffect, createContext, useContext } = React;

// API Configuration
const API = window.location.origin + '/api';
const TODAY = new Date().toISOString().split('T')[0];

// Helper Functions
const formatCurrency = (n) => '₹' + (n || 0).toLocaleString('en-IN');
const formatDate = (d) => d ? new Date(d).toLocaleDateString('en-IN', { day: '2-digit', month: 'short' }) : '—';
const formatWhatsApp = (n) => n ? `https://wa.me/91${n.replace(/\D/g, '')}` : '#';
const formatTel = (n) => n ? `tel:${n}` : '#';

// API Calls
async function apiFetch(path, options = {}) {
  const token = localStorage.getItem('bl_token');
  const headers = { 'Content-Type': 'application/json' };
  if (token) headers['Authorization'] = `Bearer ${token}`;
  
  const response = await fetch(API + path, { headers, ...options });
  const data = await response.json();
  if (!response.ok) throw new Error(data.error || 'Request failed');
  return data;
}

// Toast Context
const ToastContext = createContext(null);
function useToast() { return useContext(ToastContext); }

function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);
  const show = (msg, type = 'success') => {
    const id = Date.now();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3000);
  };
  return (
    React.createElement(ToastContext.Provider, { value: show },
      children,
      React.createElement('div', { className: 'toast-container' },
        toasts.map(t => React.createElement('div', { key: t.id, className: 'toast' }, t.type === 'success' ? '✓' : '⚠️', ' ', t.msg))
      )
    )
  );
}

// Auth Screen
function AuthScreen({ onLogin }) {
  const [isLogin, setIsLogin] = useState(true);
  const [form, setForm] = useState({ name: '', email: '', password: '', companyName: '' });
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const toast = useToast();

  const handleSubmit = async () => {
    setError('');
    setLoading(true);
    try {
      const endpoint = isLogin ? '/auth/login' : '/auth/register';
      const data = await apiFetch(endpoint, { method: 'POST', body: JSON.stringify(form) });
      localStorage.setItem('bl_token', data.token);
      localStorage.setItem('bl_user', JSON.stringify(data.user));
      toast(`Welcome ${data.user.name}!`);
      onLogin(data.user);
    } catch (err) {
      setError(err.message);
    }
    setLoading(false);
  };

  return React.createElement('div', { className: 'auth-container' },
    React.createElement('div', { className: 'auth-card' },
      React.createElement('div', { className: 'auth-logo' }, '🏗️ BUILDLEDGER'),
      React.createElement('div', { className: 'auth-sub' }, 'Construction Management Platform'),
      React.createElement('div', { className: 'auth-tabs' },
        React.createElement('button', { className: `auth-tab ${isLogin ? 'active' : ''}`, onClick: () => { setIsLogin(true); setError(''); } }, 'Sign In'),
        React.createElement('button', { className: `auth-tab ${!isLogin ? 'active' : ''}`, onClick: () => { setIsLogin(false); setError(''); } }, 'Register')
      ),
      !isLogin && React.createElement('div', { className: 'input-group' },
        React.createElement('label', { className: 'label' }, 'Full Name'),
        React.createElement('input', { className: 'input', placeholder: 'Ramesh Kumar', value: form.name, onChange: e => setForm({ ...form, name: e.target.value }) })
      ),
      !isLogin && React.createElement('div', { className: 'input-group' },
        React.createElement('label', { className: 'label' }, 'Company Name'),
        React.createElement('input', { className: 'input', placeholder: 'RK Constructions', value: form.companyName, onChange: e => setForm({ ...form, companyName: e.target.value }) })
      ),
      React.createElement('div', { className: 'input-group' },
        React.createElement('label', { className: 'label' }, 'Email'),
        React.createElement('input', { className: 'input', type: 'email', placeholder: 'you@example.com', value: form.email, onChange: e => setForm({ ...form, email: e.target.value }) })
      ),
      React.createElement('div', { className: 'input-group' },
        React.createElement('label', { className: 'label' }, 'Password'),
        React.createElement('input', { className: 'input', type: 'password', placeholder: '••••••••', value: form.password, onChange: e => setForm({ ...form, password: e.target.value }) })
      ),
      error && React.createElement('div', { style: { color: 'var(--danger)', fontSize: '13px', marginTop: '10px' } }, error),
      React.createElement('button', { className: 'btn btn-primary btn-full', style: { marginTop: '20px' }, onClick: handleSubmit, disabled: loading },
        loading ? 'Loading...' : (isLogin ? 'Sign In' : 'Create Account')
      )
    )
  );
}

// Bottom Navigation
function BottomNav({ page, setPage, onLogout, showMore, setShowMore }) {
  const mainItems = [
    { id: 'dashboard', icon: '📊', label: 'Home' },
    { id: 'workers', icon: '👷', label: 'Workers' },
    { id: 'attendance', icon: '📋', label: 'Attendance' },
    { id: 'sites', icon: '🏗️', label: 'Sites' }
  ];
  const moreItems = [
    { id: 'owners', icon: '👤', label: 'Owners' },
    { id: 'payments', icon: '💰', label: 'Payments' },
    { id: 'expenses', icon: '💸', label: 'Expenses' }
  ];

  return React.createElement('div', { className: 'bottom-nav' },
    mainItems.map(item => React.createElement('button', {
      key: item.id,
      className: `nav-item ${page === item.id ? 'active' : ''}`,
      onClick: () => { setPage(item.id); setShowMore(false); }
    }, React.createElement('span', { className: 'ico' }, item.icon), React.createElement('span', null, item.label))),
    React.createElement('div', { style: { position: 'relative' } },
      React.createElement('button', { className: `nav-item ${showMore ? 'active' : ''}`, onClick: () => setShowMore(!showMore) },
        React.createElement('span', { className: 'ico' }, '⚙️'), React.createElement('span', null, 'More')
      ),
      showMore && React.createElement('div', { style: { position: 'absolute', bottom: '100%', left: '50%', transform: 'translateX(-50%)', background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: '12px', padding: '8px', marginBottom: '8px', minWidth: '150px', zIndex: 200 } },
        moreItems.map(item => React.createElement('button', {
          key: item.id,
          style: { width: '100%', display: 'flex', alignItems: 'center', gap: '10px', padding: '10px', background: 'none', border: 'none', color: 'var(--text)', cursor: 'pointer', borderRadius: '8px' },
          onClick: () => { setPage(item.id); setShowMore(false); }
        }, React.createElement('span', null, item.icon), React.createElement('span', null, item.label))),
        React.createElement('hr', { style: { margin: '8px 0', borderColor: 'var(--border)' } }),
        React.createElement('button', {
          style: { width: '100%', display: 'flex', alignItems: 'center', gap: '10px', padding: '10px', background: 'none', border: 'none', color: 'var(--danger)', cursor: 'pointer', borderRadius: '8px' },
          onClick: onLogout
        }, React.createElement('span', null, '🚪'), React.createElement('span', null, 'Logout'))
      )
    )
  );
}

// Dashboard Component
function Dashboard({ setPage }) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    apiFetch('/finance/dashboard').then(d => { setData(d); setLoading(false); }).catch(() => setLoading(false));
  }, []);

  if (loading) return React.createElement('div', { className: 'loader' }, React.createElement('div', { className: 'spinner' }), 'Loading...');
  if (!data) return React.createElement('div', { className: 'empty-state' }, React.createElement('div', { className: 'empty-icon' }, '⚠️'), 'Failed to load data');

  const { totals, todayAttendance, recentPayments, sites } = data;

  return React.createElement('div', { className: 'main' },
    React.createElement('div', { className: 'header' },
      React.createElement('div', { className: 'title' }, 'BUILDLEDGER'),
      React.createElement('div', { className: 'subtitle' }, formatDate(TODAY))
    ),
    React.createElement('div', { className: 'stats-grid' },
      React.createElement('div', { className: 'stat-card income' },
        React.createElement('div', { className: 'stat-icon' }, '💰'),
        React.createElement('div', { className: 'stat-value income' }, formatCurrency(totals.totalReceived)),
        React.createElement('div', { className: 'stat-label' }, 'Total Received')
      ),
      React.createElement('div', { className: 'stat-card outstanding' },
        React.createElement('div', { className: 'stat-icon' }, '⚠️'),
        React.createElement('div', { className: 'stat-value outstanding' }, formatCurrency(totals.totalOutstanding)),
        React.createElement('div', { className: 'stat-label' }, 'Outstanding')
      ),
      React.createElement('div', { className: 'stat-card profit' },
        React.createElement('div', { className: 'stat-icon' }, '📈'),
        React.createElement('div', { className: 'stat-value profit' }, formatCurrency(totals.netProfit)),
        React.createElement('div', { className: 'stat-label' }, 'Net Profit')
      ),
      React.createElement('div', { className: 'stat-card workers' },

// Attendance Component
function Attendance() {
  const [workers, setWorkers] = useState([]);
  const [attendance, setAttendance] = useState({});
  const [date, setDate] = useState(TODAY);
  const toast = useToast();

  useEffect(() => {
    apiFetch('/workers').then(w => setWorkers(w.filter(x => x.status === 'active'))).catch(() => {});
  }, []);

  useEffect(() => {
    apiFetch(`/attendance/by-date/${date}`).then(recs => {
      const map = {};
      recs.forEach(r => { map[r.workerId?._id || r.workerId] = r; });
      setAttendance(map);
    }).catch(() => {});
  }, [date]);

  const markAttendance = async (workerId, status) => {
    try {
      const rec = await apiFetch('/attendance/mark', { method: 'POST', body: JSON.stringify({ workerId, date, status }) });
      setAttendance(a => ({ ...a, [workerId]: rec }));
    } catch (err) { toast(err.message, 'error'); }
  };

  const togglePaid = async (workerId) => {
    const rec = attendance[workerId];
    if (!rec?._id) { toast('Mark attendance first', 'error'); return; }
    try {
      const updated = await apiFetch(`/attendance/${rec._id}/wage-paid`, { method: 'PATCH', body: JSON.stringify({ wagePaid: !rec.wagePaid }) });
      setAttendance(a => ({ ...a, [workerId]: updated }));
    } catch (err) { toast(err.message, 'error'); }
  };

  const changeDate = (days) => {
    const dt = new Date(date);
    dt.setDate(dt.getDate() + days);
    setDate(dt.toISOString().split('T')[0]);
  };

  return React.createElement('div', { className: 'main' },
    React.createElement('div', { className: 'header' },
      React.createElement('div', { className: 'title' }, 'ATTENDANCE'),
      React.createElement('div', { className: 'subtitle' }, formatDate(date))
    ),
    React.createElement('div', { className: 'date-bar' },
      React.createElement('div', { className: 'date-nav' },
        React.createElement('button', { onClick: () => changeDate(-1) }, '←'),
        React.createElement('input', { className: 'input', type: 'date', value: date, onChange: e => setDate(e.target.value), style: { width: '140px', margin: 0 } }),
        React.createElement('button', { onClick: () => changeDate(1) }, '→')
      ),
      date !== TODAY && React.createElement('button', { className: 'btn btn-outline btn-small', onClick: () => setDate(TODAY) }, 'Today')
    ),
    workers.map(w => {
      const rec = attendance[w._id];
      const status = rec?.status;
      const wagePaid = rec?.wagePaid;
      const wageAmount = status === 'present' ? w.dailyWage : status === 'half' ? w.dailyWage / 2 : 0;

      return React.createElement('div', { key: w._id, className: 'attendance-row' },
        React.createElement('div', { className: 'attendance-avatar' }, w.name[0]),
        React.createElement('div', { className: 'attendance-info' },
          React.createElement('div', { className: 'attendance-name' }, w.name),
          React.createElement('div', { className: 'attendance-meta' }, w.skill + ' · ' + formatCurrency(w.dailyWage) + '/day')
        ),
        React.createElement('div', { className: 'status-buttons' },
          React.createElement('button', { className: `status-btn present ${status === 'present' ? 'active' : ''}`, onClick: () => markAttendance(w._id, 'present') }, 'P'),
          React.createElement('button', { className: `status-btn half ${status === 'half' ? 'active' : ''}`, onClick: () => markAttendance(w._id, 'half') }, '½'),
          React.createElement('button', { className: `status-btn absent ${status === 'absent' ? 'active' : ''}`, onClick: () => markAttendance(w._id, 'absent') }, 'A')
        ),
        (status === 'present' || status === 'half') && React.createElement('div', { className: 'wage-toggle' },
          React.createElement('button', { className: `toggle ${wagePaid ? 'on' : 'off'}`, onClick: () => togglePaid(w._id) }),
          React.createElement('span', { style: { fontSize: '11px', color: 'var(--text-secondary)' } }, wagePaid ? 'Paid' : formatCurrency(wageAmount))
        )
      );
    })
  );
}

function App() {

  const [page, setPage] = useState('dashboard');
  const [showMore, setShowMore] = useState(false);

  const logout = () => {
    localStorage.removeItem('bl_token');
    localStorage.removeItem('bl_user');
    setUser(null);
  };

  if (!user) return React.createElement(ToastProvider, null, React.createElement(AuthScreen, { onLogin: u => { setUser(u); setPage('dashboard'); } }));

  const CurrentPage = PAGES[page] || Dashboard;

  return React.createElement(ToastProvider, null,
    React.createElement('div', null,
      React.createElement(CurrentPage, { setPage }),
      React.createElement(BottomNav, { page, setPage, onLogout: logout, showMore, setShowMore })
    )
  );
}
